<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CaseWise – Download Report</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
</head>
<body>
<div class="container">
    <header class="site-header">
        <div class="logo-badge"><i class="bi bi-heart-pulse-fill"></i></div>
        <div class="header-text">
            <h1>CaseWise Reports</h1>
            <p>Retrieve your AI-generated medical report</p>
        </div>
    </header>

    {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
        <div class="flash-container">
            {% for category, message in messages %}
                <div class="flash {{ category }}"><i class="bi bi-exclamation-circle-fill"></i> {{ message }}</div>
            {% endfor %}
        </div>
    {% endif %}
    {% endwith %}

    <section class="card">
        <h2><i class="bi bi-file-earmark-arrow-down"></i> Enter Patient ID</h2>
        <form method="post">
            <div class="form-group">
                <label for="patient_id"><i class="bi bi-id-card"></i> Patient ID *</label>
                <input type="text" id="patient_id" name="patient_id" required>
            </div>
            <button type="submit" class="btn-primary"><i class="bi bi-download"></i> Download Latest Report (PDF)</button>
        </form>
    </section>

    <div class="actions">
        <a href="{{ url_for('index') }}" class="btn-link"><i class="bi bi-house-door"></i> Back to Home</a>
    </div>
</div>
</body>
</html>
